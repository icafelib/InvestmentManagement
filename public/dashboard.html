<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>主页 - 投资管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
  <header class="topbar">
    <h1>投资管理</h1>
    <div>
      <span id="user-label"></span>
      <button id="logout-btn" class="link-btn">退出</button>
    </div>
  </header>

  <section class="panel">
    <h2>投资分布</h2>
    <div class="chart-wrap"><canvas id="pie"></canvas></div>
  </section>

  <section class="panel">
    <h2>投资清单</h2>
    <div class="toolbar">
      <button id="add-btn">新增一行</button>
    </div>
    <table id="invest-table">
      <thead>
        <tr>
          <th>编号</th><th>产品名</th><th>类型</th><th>金额</th><th>平台</th><th>操作</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <div class="pager">
      <button id="prev-btn">上一页</button>
      <span id="page-info"></span>
      <button id="next-btn">下一页</button>
    </div>
  </section>

  <section class="panel">
    <h2>实用工具</h2>
    <textarea id="tools-text" rows="8" placeholder="在此填写任意字符串，自动保存到 KV"></textarea>
    <div class="toolbar">
      <button id="save-tools-btn">保存</button>
      <span id="tools-status" class="muted"></span>
    </div>
  </section>

  <!-- 编辑/新增弹窗 -->
  <dialog id="row-dialog">
    <form method="dialog" id="row-form">
      <h3 id="dialog-title">编辑投资</h3>
      <label>编号 <input name="code" required /></label>
      <label>产品名 <input name="name" required /></label>
      <label>类型
        <select name="type" required>
          <option value="灵活资产">灵活资产</option>
          <option value="稳健投资">稳健投资</option>
          <option value="风险投资">风险投资</option>
        </select>
      </label>
      <label>金额 <input name="amount" type="number" step="0.01" required /></label>
      <label>平台 <input name="platform" required /></label>
      <menu>
        <button type="button" id="cancel-row">取消</button>
        <button type="submit" id="save-row">保存</button>
      </menu>
    </form>
  </dialog>

  <script src="/js/dashboard.js"></script>
</body>
</html>
