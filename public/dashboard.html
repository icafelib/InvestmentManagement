<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>主页 - 资产配置管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
</head>
<body>
  <header class="topbar">
    <h1>资产配置管理</h1>
    <div class="topbar-right">
      <div class="user-menu" id="user-menu">
        <span id="user-label" class="user-label"></span>
        <div class="user-dropdown">
          <button type="button" id="change-pwd-btn" class="dropdown-item">修改密码</button>
        </div>
      </div>
      <button id="logout-btn" class="link-btn">退出</button>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="overview">资产总览</button>
    <button class="tab-btn" data-tab="records">资产详细记录</button>
  </nav>

  <div id="tab-overview" class="tab-pane active">
  <section class="panel">
    <h2>资产配置分布</h2>
    <div class="charts-row">
      <div class="chart-cell">
        <h3>按产品名称</h3>
        <div class="chart-wrap"><canvas id="pie-name"></canvas></div>
      </div>
      <div class="chart-cell">
        <h3>按资产类型</h3>
        <div class="chart-wrap"><canvas id="pie-type"></canvas></div>
      </div>
    </div>
  </section>

  <section class="panel">
    <h2>资产配置清单</h2>
    <div class="toolbar">
      <button id="add-btn">新增一行</button>
    </div>
    <table id="invest-table">
      <thead>
        <tr>
          <th class="sortable" data-key="name">产品名称</th>
          <th class="sortable" data-key="code">代码</th>
          <th class="sortable" data-key="type">类型</th>
          <th class="sortable" data-key="amount">金额</th>
          <th class="sortable" data-key="platform">平台</th>
          <th class="sortable" data-key="pct">占比</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <div class="pager">
      <button id="prev-btn">上一页</button>
      <span id="page-info"></span>
      <button id="next-btn">下一页</button>
    </div>
    <div class="toolbar">
      <button id="export-btn">导出 CSV</button>
    </div>
  </section>

  <section class="panel">
    <h2>实用工具</h2>
    <textarea id="tools-text" rows="8" placeholder="在此填写任意字符串，自动保存到 KV" autocomplete="off" spellcheck="false"></textarea>
    <div class="toolbar">
      <button id="save-tools-btn">保存</button>
      <span id="tools-status" class="muted"></span>
    </div>
  </section>
  </div>

  <div id="tab-records" class="tab-pane">
    <section class="panel">
      <h2>资产详细记录</h2>
      <div class="annual-box">
        <label>年份 <input id="annual-year" type="number" min="1900" max="2999" step="1" placeholder="如 2026" /></label>
        <button id="annual-calc-btn" type="button">计算年化率</button>
        <span id="annual-result" class="annual-result"></span>
      </div>
      <p class="annual-formula muted">
        计算公式：仅取该年份内的投资记录（日期超过今天的不计入）。
        总收益率 = (Σ当前市值 − Σ投资金额) / Σ投资金额；
        加权平均持有天数 = Σ(投资金额 × 持有天数) / Σ投资金额，其中持有天数 = min(今天, 当年 12-31) − 投资日期；
        年化率 = 总收益率 × 365 / 加权平均持有天数。
      </p>
      <div class="toolbar">
        <button id="add-record-btn">新增一条</button>
      </div>
      <table id="record-table">
        <thead>
          <tr>
            <th class="sortable" data-key="date">时间</th>
            <th class="sortable" data-key="amount">投资金额</th>
            <th class="sortable" data-key="product">产品</th>
            <th class="sortable" data-key="currentValue">当前市值</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <div class="muted" id="record-empty" style="margin-top:8px; display:none;">暂无记录</div>
    </section>
  </div>

  <!-- 编辑/新增弹窗 -->
  <dialog id="row-dialog">
    <form method="dialog" id="row-form" autocomplete="off">
      <h3 id="dialog-title">编辑资产配置</h3>
      <label>产品名称 <input name="name" required autocomplete="off" /></label>
      <label>代码 <input name="code" autocomplete="off" /></label>
      <label>类型
        <select name="type" required>
          <option value="灵活资产">灵活资产</option>
          <option value="稳健投资">稳健投资</option>
          <option value="混合基金">混合基金</option>
          <option value="风险投资">风险投资</option>
        </select>
      </label>
      <label>金额 <input name="amount" type="number" step="0.01" required autocomplete="off" /></label>
      <label>平台 <input name="platform" autocomplete="off" /></label>
      <menu>
        <button type="button" id="cancel-row">取消</button>
        <button type="submit" id="save-row">保存</button>
      </menu>
    </form>
  </dialog>

  <!-- 修改密码弹窗 -->
  <dialog id="pwd-dialog">
    <form method="dialog" id="pwd-form" autocomplete="off">
      <h3>修改密码</h3>
      <label>旧密码 <input name="oldPassword" type="password" required autocomplete="current-password" /></label>
      <label>新密码 <input name="newPassword" type="password" required autocomplete="new-password" minlength="4" /></label>
      <label>确认新密码 <input name="newPassword2" type="password" required autocomplete="new-password" minlength="4" /></label>
      <p id="pwd-error" class="error"></p>
      <menu>
        <button type="button" id="cancel-pwd">取消</button>
        <button type="submit" id="save-pwd">确定</button>
      </menu>
    </form>
  </dialog>

  <!-- 资产详细记录 新增/编辑 弹窗 -->
  <dialog id="record-dialog">
    <form method="dialog" id="record-form" autocomplete="off">
      <h3 id="record-dialog-title">新增资产记录</h3>
      <label>时间 <input name="date" type="date" required autocomplete="off" /></label>
      <label>投资金额 <input name="amount" type="number" step="0.01" required autocomplete="off" /></label>
      <label>产品 <input name="product" autocomplete="off" placeholder="可为空" /></label>
      <label>当前市值 <input name="currentValue" type="number" step="0.01" autocomplete="off" placeholder="留空则等于投资金额" /></label>
      <menu>
        <button type="button" id="cancel-record">取消</button>
        <button type="submit" id="save-record">保存</button>
      </menu>
    </form>
  </dialog>

  <script src="/js/dashboard.js"></script>
</body>
</html>
