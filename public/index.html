<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>登录 - 投资管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="login-body">
  <form id="login-form" class="login-card">
    <h2>投资管理 · 登录</h2>
    <label>用户名 <input id="username" name="username" required autocomplete="username" /></label>
    <label>密码 <input id="password" name="password" type="password" required autocomplete="current-password" /></label>
    <label class="remember"><input id="remember" type="checkbox" /> 记住我</label>
    <button type="submit">登录</button>
    <p id="error" class="error"></p>
  </form>
  <script src="/js/login.js"></script>
</body>
</html>
